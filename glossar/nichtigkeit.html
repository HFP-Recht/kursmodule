<h1>Nichtigkeit</h1>
<p>Nichtigkeit bedeutet, dass ein Vertrag von Anfang an keine rechtliche Wirkung entfaltet. Rechtsgeschäfte mit schwerem Mangel gelten so, als wären sie nie gültig zustande gekommen.</p>
<p>Bei Formmängeln kann dies zur Rückabwicklung bereits erbrachter Leistungen führen.</p>
