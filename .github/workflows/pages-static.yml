name: Deploy Static Portal To Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Regenerate portal and glossary artifacts
        run: |
          python glossar/generate_from_md.py
          python build_portal.py

      - name: Verify required generated assets
        run: |
          test -f index.html
          test -f glossar/keywords.json

      - name: Prepare static site
        run: |
          mkdir -p _site
          cp index.html _site/index.html
          cp -r laws _site/laws
          cp -r module_mindmaps _site/module_mindmaps
          cp -r glossar _site/glossar

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
