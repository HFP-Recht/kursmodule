name: Publish Offline ZIP

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Regenerate portal and glossary artifacts
        run: |
          python glossar/generate_from_md.py
          python build_portal.py

      - name: Verify required generated assets
        run: |
          test -f index.html
          test -f glossar/keywords.json

      - name: Build offline package
        run: |
          mkdir -p dist/offline
          cp index.html dist/offline/index.html
          cp -r laws dist/offline/laws
          cp -r module_mindmaps dist/offline/module_mindmaps
          cp -r glossar dist/offline/glossar
          cd dist
          zip -r hfp-offline.zip offline

      - name: Create or update release
        uses: ncipollo/release-action@v1
        with:
          tag: offline-latest
          name: Offline Package (auto-updated)
          body: Automatically updated offline package from the latest main branch commit.
          artifacts: dist/hfp-offline.zip
          allowUpdates: true
          replacesArtifacts: true
          makeLatest: true
